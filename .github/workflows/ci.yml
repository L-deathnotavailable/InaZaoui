name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests-and-static-analysis:
    name: Tests and static analysis
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inazaoui_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: test
      APP_DEBUG: 1
      APP_SECRET: test_secret
      KERNEL_CLASS: App\Kernel
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/inazaoui?serverVersion=8.0.32&charset=utf8mb4"
      SYMFONY_DEPRECATIONS_HELPER: 999999

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Vérifier les versions
        run: |
          php -v
          composer --version

      - name: Valider composer.json
        run: composer validate --strict

      - name: Installer les dépendances Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Vérifier les vulnérabilités Composer
        run: composer audit

      - name: Préparer la base de données de test
        run: |
          php bin/console doctrine:database:drop --env=test --force --if-exists
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:schema:create --env=test
          php bin/console doctrine:fixtures:load --env=test --no-interaction

      - name: Vérifier le schéma Doctrine
        run: php bin/console doctrine:schema:validate --env=test

      - name: Lancer les tests PHPUnit
        run: php bin/phpunit

      - name: Lancer PHPStan
        run: php -d memory_limit=1G vendor/bin/phpstan analyse -c phpstan.dist.neon --no-progress